site_name: Certified API docs

theme:
    name: "material"

markdown_extensions:
  - admonition

plugins:
  - mkdocstrings

exclude_docs: |
  certs.md
  reference.md
  how-to-guides.md
  explanation.md

nav:
  - Home: index.md
  - Install: cli.md
  - Tutorials:
    - tutorials/index.md
    - "Setting up an identity": tutorials/setup.md
    - "Connecting with another organization": tutorials/connecting.md
    - "Serving an API over mTLS": tutorials/serving.md
  - How-To Guides:
    - howto/index.md
    - "Create an identity": howto/init.md
    - "Inspect certificates": howto/inspect.md
    - "Cross-org introduction": howto/introduce.md
    - "Add a known service": howto/add-service.md
    - "Trust a client": howto/add-client.md
    - "Join an organization": howto/set-org.md
    - "Call an mTLS API": howto/api-client.md
    - "Run an mTLS server": howto/api-server.md
    - "Rich JSON logging": howto/logging.md
    - "Integrate with A2A": howto/a2a.md
  - Concept Guide:
    - concepts/index.md
    - "Key Management": concepts/keys.md
    - "Cross-chain Trust": concepts/cross_chain_trust.md
    - "Authorization Model": concepts/authz.md
    - "Certificates vs Tokens": concepts/certs_vs_tokens.md
  - Reference:
    - reference/index.md
    - reference/cert.md
    - reference/ca.md
    - reference/cert_base.md
    - reference/cert_info.md
    - reference/encode.md
    - reference/serial.md
    - reference/models.md
    - reference/fast.md
    - reference/layout.md
    - reference/blob.md
